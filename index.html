<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="社会ドリル">
<meta name="theme-color" content="#1a1a2e">
<title>社会ドリル</title>
<style>
:root{
  --bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;
  --accent:#e94560;--accent2:#f5a623;--combo:#ffd54f;
  --correct:#4caf50;--wrong:#e94560;
  --text:#eaeaea;--text2:#8892a4;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.screen{display:none;flex-direction:column;min-height:100dvh;}
.screen.active{display:flex;}

/* HOME */
#home{align-items:center;padding:24px 20px calc(24px + env(safe-area-inset-bottom));padding-top:calc(24px + env(safe-area-inset-top));gap:14px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.logo-area{text-align:center;}
.logo-icon{font-size:48px;}
.logo-title{font-size:24px;font-weight:700;color:var(--accent);margin-top:6px;letter-spacing:.04em;}
.logo-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.stats-bar{display:flex;gap:10px;background:var(--surface);border-radius:var(--radius);padding:12px 14px;width:100%;max-width:380px;}
.stat{flex:1;text-align:center;}
.stat-val{font-size:18px;font-weight:700;color:var(--accent2);}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px;}

/* 単元別グラフ */
.stats-chart-card{background:var(--surface);border-radius:var(--radius);padding:14px;width:100%;max-width:380px;}
.stats-chart-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.08em;margin-bottom:10px;}
.unit-stat-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.unit-stat-row:last-child{margin-bottom:0;}
.unit-stat-icon{font-size:16px;flex-shrink:0;}
.unit-stat-info{flex:1;}
.unit-stat-name{font-size:11px;font-weight:600;margin-bottom:3px;}
.unit-stat-bar-wrap{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.unit-stat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.unit-stat-pct{font-size:11px;font-weight:700;color:var(--accent2);min-width:32px;text-align:right;}

/* 苦手ピックアップ */
.weak-card{background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--radius);padding:12px 14px;width:100%;max-width:380px;display:none;cursor:pointer;-webkit-appearance:none;}
.weak-card.visible{display:block;}
.weak-card-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.weak-card-icon{font-size:18px;}
.weak-card-title{font-size:13px;font-weight:700;color:var(--accent);}
.weak-card-sub{font-size:11px;color:var(--text2);}
.weak-card-count{font-size:11px;color:var(--accent);margin-top:4px;font-weight:600;}

/* 復習ボタン */
.review-home-btn{background:var(--surface);border:1.5px solid var(--accent2);border-radius:var(--radius);padding:12px 14px;display:none;align-items:center;gap:10px;cursor:pointer;text-align:left;width:100%;max-width:380px;-webkit-appearance:none;}
.review-home-btn.visible{display:flex;}
.review-home-icon{font-size:22px;flex-shrink:0;}
.review-home-info{flex:1;}
.review-home-title{font-size:14px;font-weight:700;color:var(--accent2);}
.review-home-sub{font-size:11px;color:var(--text2);margin-top:2px;}

.section-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text2);align-self:flex-start;width:100%;max-width:380px;}
.type-legend{display:flex;gap:8px;width:100%;max-width:380px;}
.type-badge{flex:1;border-radius:8px;padding:8px 6px;text-align:center;font-size:10px;font-weight:700;}
.type-blank{background:rgba(233,69,96,.15);border:1.5px solid var(--accent);color:var(--accent);}
.type-def{background:rgba(245,166,35,.15);border:1.5px solid var(--accent2);color:var(--accent2);}
.unit-list{display:flex;flex-direction:column;gap:8px;width:100%;max-width:380px;}
.unit-btn{background:var(--surface);border:none;border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;-webkit-appearance:none;transition:background .15s;}
.unit-btn:active{background:var(--surface2);}
.unit-icon{font-size:24px;flex-shrink:0;}
.unit-info{flex:1;}
.unit-name{font-size:14px;font-weight:600;}
.unit-count{font-size:11px;color:var(--text2);margin-top:2px;}
.unit-arrow{font-size:18px;color:var(--text2);}

/* LEVEL SELECT */
#level-select{padding:20px;padding-top:calc(20px + env(safe-area-inset-top));gap:14px;overflow-y:auto;}
.back-btn{background:none;border:none;color:var(--accent);font-size:15px;cursor:pointer;-webkit-appearance:none;padding:4px 0;align-self:flex-start;}
.page-title{font-size:20px;font-weight:700;}
.page-sub{font-size:12px;color:var(--text2);}
/* タイムアタックトグル */
.mode-toggle-row{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:10px;padding:12px 14px;}
.mode-toggle-label{font-size:13px;font-weight:600;flex:1;}
.mode-toggle-sub{font-size:10px;color:var(--text2);}
.toggle-switch{position:relative;width:44px;height:26px;background:var(--surface2);border-radius:13px;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle-switch.on{background:var(--accent);}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:white;transition:transform .2s;}
.toggle-switch.on .toggle-knob{transform:translateX(18px);}
.level-list{display:flex;flex-direction:column;gap:10px;}
.level-btn{background:var(--surface);border:2px solid transparent;border-radius:var(--radius);padding:16px;cursor:pointer;text-align:left;-webkit-appearance:none;}
.level-btn:active{border-color:var(--accent);}
.level-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;margin-bottom:6px;}
.lv1 .level-badge{background:rgba(233,69,96,.2);color:#ff6b8a;}
.lv2 .level-badge{background:rgba(245,166,35,.2);color:#f5a623;}
.lv3 .level-badge{background:rgba(76,175,80,.2);color:#81c784;}
.level-name{font-size:15px;font-weight:700;}
.level-desc{font-size:11px;color:var(--text2);margin-top:3px;}
.level-qcount{font-size:11px;color:var(--text2);margin-top:6px;}

/* QUIZ */
#quiz{overflow:hidden;}
.quiz-header{background:var(--surface);padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;}
.quiz-back{background:none;border:none;color:var(--accent);font-size:15px;cursor:pointer;-webkit-appearance:none;}
.progress-wrap{flex:1;}
.progress-text{font-size:11px;color:var(--text2);margin-bottom:3px;}
.progress-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease;}
.score-badge{background:var(--bg);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--accent2);}
/* タイマーバー */
.timer-bar-wrap{height:4px;background:var(--bg);display:none;}
.timer-bar-fill{height:100%;background:var(--correct);transition:width .1s linear,background .3s;}
/* コンボ */
.combo-banner{display:none;text-align:center;font-size:13px;font-weight:700;color:var(--combo);padding:6px;background:rgba(255,213,79,.1);animation:comboPop .3s ease;}
.combo-banner.show{display:block;}
@keyframes comboPop{0%{transform:scale(.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
.quiz-body{flex:1;padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:12px;}
.question-card{background:var(--surface);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:8px;}
.q-type-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;align-self:flex-start;}
.q-type-blank{background:rgba(233,69,96,.2);color:#ff6b8a;}
.q-type-def{background:rgba(245,166,35,.2);color:#f5a623;}
.q-type-ex{background:rgba(76,175,80,.2);color:#81c784;}
.q-type-map{background:rgba(100,150,255,.2);color:#7eb3ff;}
.question-level{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text2);}
.question-text{font-size:15px;font-weight:600;line-height:1.7;}
.svg-container{background:#f8f8f2;border-radius:10px;padding:8px;display:none;justify-content:center;align-items:center;margin-top:6px;}
.svg-container.show{display:flex;}
.svg-container svg{max-width:100%;height:auto;}
.map-source{font-size:10px;color:var(--text2);text-align:right;padding-top:3px;display:none;}
.map-source.show{display:block;}
.textbook-quote{background:rgba(255,255,255,.04);border-left:3px solid var(--accent2);border-radius:0 6px 6px 0;padding:10px 12px;font-size:12px;line-height:1.7;color:var(--text2);display:none;}
.textbook-quote.show{display:block;}
.textbook-quote::before{content:'📖 教科書より';display:block;font-size:10px;font-weight:700;color:var(--accent2);margin-bottom:5px;}
.timeout-msg{text-align:center;color:var(--wrong);font-size:13px;font-weight:700;display:none;}
.timeout-msg.show{display:block;}
.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{background:var(--surface);border:2px solid var(--surface2);border-radius:var(--radius);padding:13px 15px;font-size:16px;font-weight:500;color:var(--text);cursor:pointer;text-align:left;-webkit-appearance:none;transition:border-color .15s,background .15s;line-height:1.5;}
.choice-btn:active:not(:disabled){border-color:var(--accent);}
.choice-btn.correct{border-color:var(--correct);background:rgba(76,175,80,.12);color:var(--correct);}
.choice-btn.wrong{border-color:var(--wrong);background:rgba(233,69,96,.12);color:var(--wrong);}
.choice-btn:disabled{cursor:default;}
.explanation-card{background:var(--surface2);border-radius:var(--radius);padding:14px;display:none;flex-direction:column;gap:8px;}
.explanation-card.show{display:flex;}
.exp-header{font-size:12px;font-weight:700;color:var(--accent2);}
.exp-text{font-size:13px;line-height:1.7;}
.next-btn{background:var(--accent);border:none;border-radius:var(--radius);padding:14px;font-size:15px;font-weight:700;color:white;cursor:pointer;-webkit-appearance:none;display:none;}
.next-btn.show{display:block;}
.next-btn:active{opacity:.85;}

/* RESULT */
#result{align-items:center;justify-content:center;padding:24px 20px calc(24px + env(safe-area-inset-bottom));padding-top:calc(24px + env(safe-area-inset-top));gap:16px;overflow-y:auto;}
.result-emoji{font-size:56px;text-align:center;}
.result-title{font-size:22px;font-weight:700;text-align:center;}
.result-sub{font-size:13px;color:var(--text2);text-align:center;}
.result-card{background:var(--surface);border-radius:var(--radius);padding:18px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px;}
.result-score-big{text-align:center;font-size:40px;font-weight:700;color:var(--accent2);}
.result-score-label{text-align:center;font-size:12px;color:var(--text2);margin-top:-8px;}
.result-stats{display:flex;gap:8px;}
.result-stat{flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center;}
.result-stat-val{font-size:16px;font-weight:700;}
.result-stat-label{font-size:10px;color:var(--text2);margin-top:2px;}
.correct-val{color:var(--correct);}
.wrong-val{color:var(--wrong);}
.combo-val{color:var(--combo);}
.level-up-banner{background:linear-gradient(135deg,#e94560,#f5a623);border-radius:10px;padding:10px 14px;text-align:center;font-size:13px;font-weight:700;color:white;display:none;}
.level-up-banner.show{display:block;}
.result-btns{display:flex;flex-direction:column;gap:8px;width:100%;max-width:380px;}
.review-btn{background:var(--accent2);border:none;border-radius:var(--radius);padding:13px;font-size:14px;font-weight:700;color:white;cursor:pointer;-webkit-appearance:none;}
.retry-btn{background:var(--accent);border:none;border-radius:var(--radius);padding:13px;font-size:14px;font-weight:700;color:white;cursor:pointer;-webkit-appearance:none;}
.home-btn{background:var(--surface);border:none;border-radius:var(--radius);padding:13px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;-webkit-appearance:none;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="logo-area">
    <div class="logo-icon">🗾</div>
    <div class="logo-title">社会ドリル</div>
    <div class="logo-sub">中学1年生 地理分野</div>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="total-points">0</div><div class="stat-label">ポイント</div></div>
    <div class="stat"><div class="stat-val" id="player-level">1</div><div class="stat-label">レベル</div></div>
    <div class="stat"><div class="stat-val" id="total-correct">0</div><div class="stat-label">正解数</div></div>
    <div class="stat"><div class="stat-val" id="max-combo-home">0</div><div class="stat-label">最大コンボ</div></div>
  </div>

  <div class="stats-chart-card">
    <div class="stats-chart-title">📊 単元別 正答率</div>
    <div class="unit-stat-row">
      <span class="unit-stat-icon">🗺️</span>
      <div class="unit-stat-info">
        <div class="unit-stat-name">身近な地域</div>
        <div class="unit-stat-bar-wrap"><div class="unit-stat-bar-fill" id="bar-0" style="width:0%;background:#e94560"></div></div>
      </div>
      <div class="unit-stat-pct" id="pct-0">-%</div>
    </div>
  </div>

  <button class="weak-card" id="weak-card-btn">
    <div class="weak-card-header"><span class="weak-card-icon">🎯</span><div><div class="weak-card-title">苦手問題ピックアップ</div><div class="weak-card-sub">間違えた回数が多い問題を集中練習</div></div></div>
    <div class="weak-card-count" id="weak-count-text">10問 選抜</div>
  </button>

  <button class="review-home-btn" id="review-home-btn">
    <span class="review-home-icon">📝</span>
    <div class="review-home-info"><div class="review-home-title">まちがい復習</div><div class="review-home-sub"><span id="review-count">0</span>問 たまっています</div></div>
    <span class="unit-arrow">›</span>
  </button>

  <div class="type-legend">
    <div class="type-badge type-blank">🔵 穴埋め<br><span style="font-weight:400;font-size:10px">重要語句を選ぶ</span></div>
    <div class="type-badge type-def">🟡 定義<br><span style="font-weight:400;font-size:10px">意味・説明を選ぶ</span></div>
  </div>

  <div class="section-label">単元を選ぼう</div>
  <div class="unit-list">
    <button class="unit-btn" data-unit="0">
      <span class="unit-icon">🗺️</span>
      <div class="unit-info"><div class="unit-name">身近な地域</div><div class="unit-count">全60問（穴埋め・定義・地図記号・地形図・P96〜P185）</div></div>
      <span class="unit-arrow">›</span>
    </button>
  </div>
</div>

<!-- LEVEL SELECT -->
<div id="level-select" class="screen">
  <button class="back-btn" id="back-to-home">← もどる</button>
  <div><div class="page-title" id="level-unit-title">身近な地域</div><div class="page-sub">難易度を選んでね</div></div>
  <div class="mode-toggle-row">
    <div><div class="mode-toggle-label">⏱ タイムアタック</div><div class="mode-toggle-sub">1問30秒制限・時間ボーナスあり</div></div>
    <div class="toggle-switch" id="time-toggle"><div class="toggle-knob"></div></div>
  </div>
  <div class="level-list">
    <button class="level-btn lv1" data-level="0">
      <span class="level-badge">BASIC</span>
      <div class="level-name">教科書の基本（穴埋め・定義）</div>
      <div class="level-desc">P94・P95の重要語句を完全マスター</div>
      <div class="level-qcount">24問</div>
    </button>
    <button class="level-btn lv2" data-level="1">
      <span class="level-badge">STANDARD</span>
      <div class="level-name">地図記号・練習問題</div>
      <div class="level-desc">地図記号の識別・読図の基礎</div>
      <div class="level-qcount">21問</div>
    </button>
    <button class="level-btn lv3" data-level="2">
      <span class="level-badge">ADVANCED</span>
      <div class="level-name">地形図の読図・応用</div>
      <div class="level-desc">計算・読み取り・総合問題</div>
      <div class="level-qcount">15問</div>
    </button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <button class="quiz-back" id="quiz-back">✕</button>
    <div class="progress-wrap">
      <div class="progress-text" id="progress-text">1 / 10</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="score-badge" id="quiz-score">0pt</div>
  </div>
  <div class="timer-bar-wrap" id="timer-bar-wrap"><div class="timer-bar-fill" id="timer-bar-fill" style="width:100%"></div></div>
  <div class="combo-banner" id="combo-banner">🔥 3連続正解！</div>
  <div class="quiz-body">
    <div class="question-card">
      <div id="q-type-badge" class="q-type-badge q-type-blank">🔵 穴埋め</div>
      <div class="question-level" id="q-level">BASIC</div>
      <div class="question-text" id="q-text"></div>
      <div class="svg-container" id="svg-container"><div id="svg-content"></div></div>
      <div class="map-source" id="map-source"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="timeout-msg" id="timeout-msg">⏰ 時間切れ！</div>
    <div class="textbook-quote" id="q-quote"></div>
    <div class="explanation-card" id="explanation">
      <div class="exp-header" id="exp-header">💡 解説</div>
      <div class="exp-text" id="exp-text"></div>
    </div>
    <button class="next-btn" id="next-btn">次の問題へ →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">すばらしい！</div>
  <div class="result-sub" id="result-sub">全問正解！</div>
  <div class="result-card">
    <div class="result-score-big" id="result-score">+50pt</div>
    <div class="result-score-label">獲得ポイント</div>
    <div class="result-stats">
      <div class="result-stat"><div class="result-stat-val correct-val" id="r-correct">0</div><div class="result-stat-label">正解</div></div>
      <div class="result-stat"><div class="result-stat-val wrong-val" id="r-wrong">0</div><div class="result-stat-label">不正解</div></div>
      <div class="result-stat"><div class="result-stat-val" id="r-rate">0%</div><div class="result-stat-label">正答率</div></div>
      <div class="result-stat"><div class="result-stat-val combo-val" id="r-combo">0</div><div class="result-stat-label">最大コンボ</div></div>
    </div>
    <div class="level-up-banner" id="level-up-banner">🎊 レベルアップ！ Lv.<span id="new-level">2</span> になった！</div>
  </div>
  <div class="result-btns">
    <button class="review-btn" id="review-result-btn" style="display:none">📝 間違えた問題を復習する</button>
    <button class="retry-btn" id="retry-btn">もう一度やる</button>
    <button class="home-btn" id="home-btn-result">単元選択にもどる</button>
  </div>
</div>

<script>
(function(){
const CHIZU_KIGO = {
  // 田
  ta: `<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <rect width="60" height="60" fill="#f5f5dc" rx="4"/>
    <line x1="10" y1="10" x2="10" y2="50" stroke="#333" stroke-width="2.5"/>
    <line x1="30" y1="10" x2="30" y2="50" stroke="#333" stroke-width="2.5"/>
    <line x1="50" y1="10" x2="50" y2="50" stroke="#333" stroke-width="2.5"/>
    <line x1="10" y1="10" x2="50" y2="10" stroke="#333" stroke-width="2.5"/>
    <line x1="10" y1="30" x2="50" y2="30" stroke="#333" stroke-width="2.5"/>
    <line x1="10" y1="50" x2="50" y2="50" stroke="#333" stroke-width="2.5"/>
  </svg>`,

// ===== STATE =====
let state={
  points:0,level:1,totalCorrect:0,maxCombo:0,
  currentUnit:0,currentLevel:0,
  questions:[],qIndex:0,
  sessionCorrect:0,sessionWrong:0,sessionPoints:0,
  sessionCombo:0,sessionMaxCombo:0,
  sessionWrongQuestions:[],
  answered:false,reviewMode:false,weakMode:false,
  timeAttack:false,timerInterval:null,timerLeft:30,
};
let unitStats=[{correct:0,total:0}];
let wrongFreq={};
let wrongBank=[];

// ===== localStorage =====
function loadAll(){
  try{const s=localStorage.getItem('shakai_state');if(s){const p=JSON.parse(s);state.points=p.points||0;state.level=p.level||1;state.totalCorrect=p.totalCorrect||0;state.maxCombo=p.maxCombo||0;}}catch(e){}
  try{const u=localStorage.getItem('shakai_unitstats');if(u)unitStats=JSON.parse(u);}catch(e){}
  try{const f=localStorage.getItem('shakai_wrongfreq');if(f)wrongFreq=JSON.parse(f);}catch(e){}
  try{const w=localStorage.getItem('shakai_wrong');if(w)wrongBank=JSON.parse(w);}catch(e){}
}
function saveAll(){
  try{
    localStorage.setItem('shakai_state',JSON.stringify({points:state.points,level:state.level,totalCorrect:state.totalCorrect,maxCombo:state.maxCombo}));
    localStorage.setItem('shakai_unitstats',JSON.stringify(unitStats));
    localStorage.setItem('shakai_wrongfreq',JSON.stringify(wrongFreq));
    localStorage.setItem('shakai_wrong',JSON.stringify(wrongBank));
  }catch(e){}
}
function addWrong(q){
  if(!wrongBank.find(w=>w.q===q.q))wrongBank.push(q);
  wrongFreq[q.q]=(wrongFreq[q.q]||0)+1;
}
function removeWrong(q){wrongBank=wrongBank.filter(w=>w.q!==q.q);}

// ===== UI更新 =====
function updateHomeStats(){
  document.getElementById('total-points').textContent=state.points;
  document.getElementById('player-level').textContent=state.level;
  document.getElementById('total-correct').textContent=state.totalCorrect;
  document.getElementById('max-combo-home').textContent=state.maxCombo;
}
function updateCharts(){
  for(let i=0;i<unitStats.length;i++){
    const s=unitStats[i];
    const pct=s.total>0?Math.round(s.correct/s.total*100):null;
    const bar=document.getElementById('bar-'+i);
    const pctEl=document.getElementById('pct-'+i);
    if(!bar)continue;
    if(pct!==null){
      bar.style.width=pct+'%';
      pctEl.textContent=pct+'%';
      bar.style.background=pct>=80?'#4caf50':pct>=60?'#ffd54f':'#e94560';
    }else{bar.style.width='0%';pctEl.textContent='-%';}
  }
}
function updateReviewUI(){
  const cnt=wrongBank.length;
  const btn=document.getElementById('review-home-btn');
  document.getElementById('review-count').textContent=cnt;
  btn.classList.toggle('visible',cnt>0);btn.style.display=cnt>0?'':'none';
  const rb=document.getElementById('review-result-btn');
  if(rb)rb.style.display=state.sessionWrongQuestions.length>0?'block':'none';
}
function updateWeakUI(){
  const keys=Object.keys(wrongFreq);
  const card=document.getElementById('weak-card-btn');
  if(keys.length>=3){
    card.classList.add('visible');card.style.display='block';
    document.getElementById('weak-count-text').textContent=Math.min(10,keys.length)+'問 選抜';
  }else{card.classList.remove('visible');card.style.display='none';}
}
function getWeakQuestions(){
  const sorted=Object.entries(wrongFreq).sort((a,b)=>b[1]-a[1]);
  const topKeys=sorted.slice(0,10).map(e=>e[0]);
  const allQ=[];
  UNITS.forEach(u=>u.levels.forEach(lvl=>lvl.forEach(q=>allQ.push(q))));
  return allQ.filter(q=>topKeys.includes(q.q));
}

// ===== SCREENS =====
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ===== TIMER =====
const TIMER_SEC=30;
function startTimer(){
  clearTimer();
  state.timerLeft=TIMER_SEC;
  const wrap=document.getElementById('timer-bar-wrap');
  const fill=document.getElementById('timer-bar-fill');
  wrap.style.display='block';fill.style.width='100%';fill.style.background='#4caf50';
  state.timerInterval=setInterval(()=>{
    state.timerLeft-=0.1;
    const pct=Math.max(0,state.timerLeft/TIMER_SEC*100);
    fill.style.width=pct+'%';
    fill.style.background=pct>50?'#4caf50':pct>25?'#ffd54f':'#e94560';
    if(state.timerLeft<=0){clearTimer();handleTimeout();}
  },100);
}
function clearTimer(){if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null;}}
function handleTimeout(){
  if(state.answered)return;
  state.answered=true;
  const q=state.questions[state.qIndex];
  const choicesEl=document.getElementById('choices');
  const correctIdx=parseInt(choicesEl.dataset.correctIdx);
  const btns=choicesEl.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  btns[correctIdx].classList.add('correct');
  state.sessionWrong++;state.sessionCombo=0;
  addWrong(q);state.sessionWrongQuestions.push(q);
  document.getElementById('timeout-msg').classList.add('show');
  document.getElementById('exp-header').textContent='⏰ 時間切れ！';
  document.getElementById('exp-text').textContent=q.exp;
  if(q.quote){const qEl=document.getElementById('q-quote');qEl.textContent=q.quote;qEl.classList.add('show');}
  document.getElementById('explanation').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('next-btn').textContent=state.qIndex+1>=state.questions.length?'結果を見る →':'次の問題へ →';
}

// ===== SVG取得 =====
function getSVGContent(q){
  if(!q.svg)return null;
  const kMap={
    'chizu_ta':CHIZU_KIGO.ta,'chizu_hata':CHIZU_KIGO.hata,
    'chizu_kajuen':CHIZU_KIGO.kajuen,'chizu_shinyou':CHIZU_KIGO.shinyou,
    'chizu_kouyo':CHIZU_KIGO.kouyo,'chizu_jinja':CHIZU_KIGO.jinja,
    'chizu_tera':CHIZU_KIGO.tera,'chizu_gakko':CHIZU_KIGO.gakko,
    'chizu_yubin':CHIZU_KIGO.yubin,'chizu_koji':CHIZU_KIGO.koji,
    'chizu_sankaku':CHIZU_KIGO.sankaku,'chizu_suijun':CHIZU_KIGO.suijun,
    'chikei_slope':CHIKEI_SVG.slope,'chikei_sensho':CHIKEI_SVG.sensho,
    'houi':CHIKEI_SVG.houi,
  };
  return kMap[q.svg]||null;
}

// ===== QUIZ =====
function startQuiz(){
  clearTimer();
  const qs=UNITS[state.currentUnit].levels[state.currentLevel];
  if(!qs||qs.length===0){alert('この単元は近日追加予定です！');return;}
  state.questions=shuffle([...qs]);
  state.qIndex=0;state.sessionCorrect=0;state.sessionWrong=0;state.sessionPoints=0;
  state.sessionCombo=0;state.sessionMaxCombo=0;
  state.sessionWrongQuestions=[];state.reviewMode=false;state.weakMode=false;
  showScreen('quiz');renderQuestion();
}
function startReview(){
  if(wrongBank.length===0)return;
  clearTimer();
  state.questions=shuffle([...wrongBank]);
  state.qIndex=0;state.sessionCorrect=0;state.sessionWrong=0;state.sessionPoints=0;
  state.sessionCombo=0;state.sessionMaxCombo=0;
  state.sessionWrongQuestions=[];state.reviewMode=true;state.weakMode=false;
  showScreen('quiz');renderQuestion();
}
function startWeak(){
  const wq=getWeakQuestions();
  if(wq.length===0)return;
  clearTimer();
  state.questions=shuffle(wq);
  state.qIndex=0;state.sessionCorrect=0;state.sessionWrong=0;state.sessionPoints=0;
  state.sessionCombo=0;state.sessionMaxCombo=0;
  state.sessionWrongQuestions=[];state.reviewMode=false;state.weakMode=true;
  showScreen('quiz');renderQuestion();
}

function updateQLabel(){
  const el=document.getElementById('q-level');
  const lvNames=['BASIC','STANDARD','ADVANCED'];
  if(state.reviewMode){el.textContent='📝 まちがい復習';el.style.color='#f5a623';}
  else if(state.weakMode){el.textContent='🎯 苦手ピックアップ';el.style.color='#ffd54f';}
  else{el.textContent=lvNames[state.currentLevel];el.style.color='';}
}

function renderQuestion(){
  const q=state.questions[state.qIndex];
  const total=state.questions.length;
  document.getElementById('progress-text').textContent=`${state.qIndex+1} / ${total}`;
  document.getElementById('progress-fill').style.width=`${(state.qIndex/total)*100}%`;
  document.getElementById('quiz-score').textContent=`${state.sessionPoints}pt`;
  updateQLabel();

  const badge=document.getElementById('q-type-badge');
  const tMap={blank:{cls:'q-type-blank',txt:'🔵 穴埋め'},def:{cls:'q-type-def',txt:'🟡 定義'},ex:{cls:'q-type-ex',txt:'🟢 練習問題'},map:{cls:'q-type-map',txt:'🗺️ 地図記号'}};
  const t=tMap[q.type]||tMap.ex;
  badge.className=`q-type-badge ${t.cls}`;badge.textContent=t.txt;
  document.getElementById('q-text').textContent=q.q;

  const svgWrap=document.getElementById('svg-container');
  const svgContent=document.getElementById('svg-content');
  const svgHtml=getSVGContent(q);
  if(svgHtml){svgContent.innerHTML=svgHtml;svgWrap.classList.add('show');}
  else{svgContent.innerHTML='';svgWrap.classList.remove('show');}

  const sourceEl=document.getElementById('map-source');
  if(q.source){sourceEl.textContent=q.source;sourceEl.classList.add('show');}
  else{sourceEl.textContent='';sourceEl.classList.remove('show');}

  const quoteEl=document.getElementById('q-quote');
  quoteEl.textContent=q.quote||'';quoteEl.classList.remove('show');

  document.getElementById('timeout-msg').classList.remove('show');
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('combo-banner').classList.remove('show');

  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  const isAlpha=q.choices.every(c=>/^[A-D]$/.test(c.trim()));
  const ordered=isAlpha?q.choices.map((v,i)=>({val:v,orig:i})):shuffleWithIndex(q.choices);
  choicesEl.dataset.correctIdx=ordered.findIndex(c=>c.orig===q.ans);
  ordered.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=q.choices[c.orig];btn.dataset.idx=i;
    choicesEl.appendChild(btn);
  });

  state.answered=false;
  if(state.timeAttack)startTimer();
  else{clearTimer();document.getElementById('timer-bar-wrap').style.display='none';}
}

function handleChoice(idx){
  if(state.answered)return;
  state.answered=true;
  clearTimer();
  const q=state.questions[state.qIndex];
  const choicesEl=document.getElementById('choices');
  const correctIdx=parseInt(choicesEl.dataset.correctIdx);
  const btns=choicesEl.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const isCorrect=parseInt(idx)===correctIdx;
  btns[idx].classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect)btns[correctIdx].classList.add('correct');

  let basePt=state.reviewMode||state.weakMode?10:(state.currentLevel===0?5:state.currentLevel===1?10:15);
  if(isCorrect){
    state.sessionCorrect++;state.sessionCombo++;
    if(state.sessionCombo>state.sessionMaxCombo)state.sessionMaxCombo=state.sessionCombo;
    let comboBonus=state.sessionCombo>=5?10:state.sessionCombo>=3?5:0;
    let timeBonus=state.timeAttack?Math.floor(state.timerLeft/TIMER_SEC*10):0;
    const gain=basePt+comboBonus+timeBonus;
    state.sessionPoints+=gain;
    let msg=`✅ 正解！ +${gain}pt`;
    if(comboBonus>0)msg+=` (コンボ+${comboBonus})`;
    if(timeBonus>0)msg+=` (速度+${timeBonus})`;
    document.getElementById('exp-header').textContent=msg;
    if(state.sessionCombo>=3){
      const cb=document.getElementById('combo-banner');
      cb.textContent=`🔥 ${state.sessionCombo}連続正解！コンボボーナス！`;
      cb.classList.add('show');
    }
    if(state.reviewMode)removeWrong(q);
    if(!state.reviewMode&&!state.weakMode){unitStats[state.currentUnit].correct++;unitStats[state.currentUnit].total++;}
  }else{
    state.sessionWrong++;state.sessionCombo=0;
    document.getElementById('exp-header').textContent='❌ 不正解';
    addWrong(q);state.sessionWrongQuestions.push(q);
    if(!state.reviewMode&&!state.weakMode)unitStats[state.currentUnit].total++;
  }

  const quoteEl=document.getElementById('q-quote');
  if(q.quote){quoteEl.textContent=q.quote;quoteEl.classList.add('show');}
  document.getElementById('quiz-score').textContent=`${state.sessionPoints}pt`;
  document.getElementById('exp-text').textContent=q.exp;
  document.getElementById('explanation').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('next-btn').textContent=state.qIndex+1>=state.questions.length?'結果を見る →':'次の問題へ →';
}

function nextQuestion(){state.qIndex++;if(state.qIndex>=state.questions.length)showResult();else renderQuestion();}

function showResult(){
  clearTimer();
  const total=state.questions.length;
  const rate=Math.round(state.sessionCorrect/total*100);
  const oldLevel=state.level;
  state.points+=state.sessionPoints;state.totalCorrect+=state.sessionCorrect;
  if(state.sessionMaxCombo>state.maxCombo)state.maxCombo=state.sessionMaxCombo;
  state.level=Math.floor(state.points/50)+1;
  const leveledUp=state.level>oldLevel;
  saveAll();
  let emoji='😢',title='もう少し！',sub=`正答率${rate}%。もう一度チャレンジ！`;
  if(rate===100){emoji='🎉';title='パーフェクト！';sub='全問正解！すごい！';}
  else if(rate>=80){emoji='😊';title='よくできた！';sub=`正答率${rate}%！もう少しで完璧！`;}
  else if(rate>=60){emoji='🙂';title='まあまあ！';sub=`正答率${rate}%。復習しよう！`;}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-sub').textContent=sub;
  document.getElementById('result-score').textContent=`+${state.sessionPoints}pt`;
  document.getElementById('r-correct').textContent=state.sessionCorrect;
  document.getElementById('r-wrong').textContent=state.sessionWrong;
  document.getElementById('r-rate').textContent=rate+'%';
  document.getElementById('r-combo').textContent=state.sessionMaxCombo;
  const banner=document.getElementById('level-up-banner');
  if(leveledUp){document.getElementById('new-level').textContent=state.level;banner.classList.add('show');}
  else banner.classList.remove('show');
  updateHomeStats();updateCharts();updateReviewUI();updateWeakUI();showScreen('result');
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function shuffleWithIndex(arr){const idx=arr.map((v,i)=>({val:v,orig:i}));for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}return idx;}

document.addEventListener('click',function(e){
  const unitBtn=e.target.closest('.unit-btn');
  if(unitBtn){state.currentUnit=parseInt(unitBtn.dataset.unit);document.getElementById('level-unit-title').textContent=UNITS[state.currentUnit].name;showScreen('level-select');return;}
  const levelBtn=e.target.closest('.level-btn');
  if(levelBtn){state.currentLevel=parseInt(levelBtn.dataset.level);startQuiz();return;}
  const choiceBtn=e.target.closest('.choice-btn');
  if(choiceBtn&&!state.answered){handleChoice(parseInt(choiceBtn.dataset.idx));return;}
  if(e.target.id==='next-btn'){nextQuestion();return;}
  if(e.target.id==='back-to-home'){showScreen('home');return;}
  if(e.target.id==='quiz-back'){clearTimer();showScreen('home');updateReviewUI();updateWeakUI();return;}
  if(e.target.id==='retry-btn'){startQuiz();return;}
  if(e.target.id==='home-btn-result'){showScreen('home');updateReviewUI();updateWeakUI();return;}
  if(e.target.id==='review-home-btn'||e.target.closest('#review-home-btn')){startReview();return;}
  if(e.target.id==='review-result-btn'){startReview();return;}
  if(e.target.id==='weak-card-btn'||e.target.closest('#weak-card-btn')){startWeak();return;}
  if(e.target.id==='time-toggle'||e.target.closest('#time-toggle')){
    const tog=document.getElementById('time-toggle');
    state.timeAttack=!state.timeAttack;
    tog.classList.toggle('on',state.timeAttack);return;
  }
});

loadAll();updateHomeStats();updateCharts();updateReviewUI();updateWeakUI();
})();
</script>
</body>
